<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather by Pincode</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f0f4f8;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .container {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      text-align: center;
      width: 300px;
    }
    input {
      padding: 10px;
      width: 80%;
      margin-bottom: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }
    button {
      padding: 10px 20px;
      border: none;
      background: #007bff;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }
    button:hover {
      background: #0056b3;
    }
    .result {
      margin-top: 15px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Weather Finder</h2>
    <input type="text" id="pincode" placeholder="Enter Pincode or City">
    <br>
    <button onclick="getWeather()">Get Weather</button>
    <div class="result" id="result"></div>
  </div>

  <script>
  async function getWeather() {
    const input = document.getElementById('pincode').value.trim();
    const apiKey = '43d784fcbd40f982b01b66f8f383cee3'; // put your real key here

    if (!input) {
      alert('Please enter pincode or city name');
      return;
    }

    let url = '';

    // Check if input is number (pincode)
    if (/^\d+$/.test(input)) {
      url = `https://api.openweathermap.org/data/2.5/weather?zip=${input},IN&units=metric&appid=${apiKey}`;
    } else {
      // Otherwise treat as city name
      url = `https://api.openweathermap.org/data/2.5/weather?q=${input}&units=metric&appid=${apiKey}`;
    }

    try {
      const res = await fetch(url);
      const data = await res.json();

      if (data.cod != 200) {
        document.getElementById('result').innerHTML = data.message;
        return;
      }

      document.getElementById('result').innerHTML = `
        <h3>${data.name}, ${data.sys.country}</h3>
        <p>🌡️ Temperature: ${data.main.temp} °C</p>
        <p>🌤️ Weather: ${data.weather[0].description}</p>
        <p>💧 Humidity: ${data.main.humidity}%</p>
        <p>🌬️ Wind: ${data.wind.speed} m/s</p>
      `;
    } catch (error) {
      document.getElementById('result').innerHTML = 'Error fetching data';
    }
  }
</script>
    }
  </script>
</body>
</html>
